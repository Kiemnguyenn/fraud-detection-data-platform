version: '3.8'

services:
  # 1. POSTGRES (Data Source - GIỮ NGUYÊN DATA CŨ)
  postgres:
    image: postgres:alpine
    container_name: fraud_postgres_source
    hostname: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Admin123!@#
      - POSTGRES_DB=core
    command: >
      postgres -c wal_level=logical -c max_replication_slots=4 -c max_wal_senders=4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fraud_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d core"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. MINIO (Data Lake)
  minio:
    image: minio/minio:latest
    container_name: fraud_minio_lake
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=Admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - fraud_network

  # 3. KAFKA & ZOOKEEPER (ĐÃ GẮN Ổ CỨNG MỚI)
  zookeeper:
    image: quay.io/debezium/zookeeper:2.5
    container_name: fraud_zookeeper
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/zookeeper/data
      - zookeeper_txns:/zookeeper/txns
    networks:
      - fraud_network

  kafka:
    image: quay.io/debezium/kafka:2.5
    container_name: fraud_kafka_broker
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      - ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/kafka/data
    networks:
      - fraud_network

  connect:
    image: quay.io/debezium/connect:2.5
    container_name: fraud_debezium_connect
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    depends_on:
      - kafka
      - postgres
    networks:
      - fraud_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fraud_kafka_ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=fraud_cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
      - KAFKA_CLUSTERS_0_CONNECTCLUSTERS_0_NAME=debezium-connect
      - KAFKA_CLUSTERS_0_CONNECTCLUSTERS_0_ADDRESS=http://connect:8083
    networks:
      - fraud_network

  # 4. CLICKHOUSE (KHO DATA WAREHOUSE MỚI)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: fraud_clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - fraud_network

  # 5. METABASE (BI DASHBOARD MỚI)
  metabase:
    image: metabase/metabase:latest
    container_name: fraud_metabase_bi
    ports:
      - "3001:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - clickhouse
    networks:
      - fraud_network

  # 6. GIÁM SÁT HỆ THỐNG (PROMETHEUS + GRAFANA + CADVISOR)
  prometheus:
    image: prom/prometheus:latest
    container_name: fraud_prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - fraud_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: fraud_cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - fraud_network

  grafana:
    image: grafana/grafana:latest
    container_name: fraud_grafana_ops
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin@123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - fraud_network

volumes:
  postgres_data:
  minio_data:
  zookeeper_data:
  zookeeper_txns:
  kafka_data:
  clickhouse_data:
  metabase_data:
  grafana_data:

networks:
  fraud_network:
    driver: bridge