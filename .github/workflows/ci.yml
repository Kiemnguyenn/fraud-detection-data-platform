name: Data Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-linting:
    name: Python Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with Flake8
        # Treat syntax errors or undefined names as blockers
        run: flake8 src/ dags/ --count --select=E9,F63,F7,F82 --show-source --statistics

  docker-validation:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        # Ensure docker-compose structure is valid before any deployment
        run: docker compose -f infra/docker-compose.yml config